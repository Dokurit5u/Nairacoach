}

const getLGAs = (state, country) => {
  if(!country||country==="Nigeria") return NG_LGAS[state]||["Main Town","GRA","Housing Estate","Old Layout","New Layout","Other"];
  if(country==="United States") return US_STATES.includes(state)?["Downtown","Suburbs","North","South","East","West","Other"]:["City","Other"];
  if(country==="United Kingdom") return ["Central","North","South","East","West","Other"];
  if(country==="Ghana") return ["Central","Kumasi","Accra Metro","Tema","Other"];
  if(country==="Kenya") return ["Nairobi CBD","Westlands","Eastlands","Karen","Other"];
  return ["Main Area","Other"];
};
const getStates = country => {
  if(!country||country==="Nigeria") return NG_STATES;
  if(country==="United States") return US_STATES;
  if(country==="United Kingdom") return UK_REGIONS;
  if(country==="Ghana") return GH_REGIONS;
  if(country==="Kenya") return KE_COUNTIES;
  return [];
};

/* ─── UTILS ──────────────────────────────────────────────── */
function useAnimNum(target, ms, run) {
  const [v,setV] = useState(0);
  useEffect(()=>{
    if(!run){setV(0);return;}
    let s=null;
    const step=ts=>{if(!s)s=ts;const p=Math.min((ts-s)/ms,1);setV(Math.floor((1-Math.pow(1-p,3))*target));if(p<1)requestAnimationFrame(step);};
    requestAnimationFrame(step);
  },[target,ms,run]);
  return v;
}

/* ─── CONFETTI ───────────────────────────────────────────── */
function Confetti({active,onDone}) {
  const ref=useRef(null);
  useEffect(()=>{
    if(!active||!ref.current)return;
    const c=ref.current;c.width=window.innerWidth;c.height=window.innerHeight;
    const ctx=c.getContext("2d");
    const pts=Array.from({length:100},()=>({x:Math.random()*c.width,y:-20,vx:(Math.random()-.5)*4,vy:Math.random()*4+2,color:["#0FA958","#FFD93D","#FF6B6B","#4CAF50","#fff"][Math.floor(Math.random()*5)],s:Math.random()*8+4,r:Math.random()*360,rv:(Math.random()-.5)*8}));
    let fr;let done=false;
    const draw=()=>{ctx.clearRect(0,0,c.width,c.height);pts.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.r+=p.rv;p.vy+=.1;ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.r*Math.PI/180);ctx.fillStyle=p.color;ctx.fillRect(-p.s/2,-p.s/4,p.s,p.s/2);ctx.restore();});if(!pts.every(p=>p.y>c.height+10))fr=requestAnimationFrame(draw);else if(!done){done=true;onDone&&onDone();}};
    draw();return()=>cancelAnimationFrame(fr);
  },[active]);
  if(!active)return null;
  return <canvas ref={ref} style={{position:"fixed",inset:0,width:"100%",height:"100%",pointerEvents:"none",zIndex:9999}}/>;
}

/* ════════════════════════════════════════════════════════════
   LOGIN SCREEN
════════════════════════════════════════════════════════════ */
function LoginScreen({savedUser, onLogin, onBack, noSavedUser}) {
  var savedEmail = (savedUser&&savedUser.email)||"";
  var savedPwd   = (savedUser&&savedUser.password)||"";
  const [email,setEmail]       = useState(noSavedUser?"":savedEmail);
  const [password,setPassword] = useState("");
  const [showPwd,setShowPwd]   = useState(false);
  const [err,setErr]           = useState("");
  const [loading,setLoading]   = useState(false);
  const first = savedUser&&savedUser.name ? savedUser.name.split(" ")[0] : "";
  const avatar = savedUser&&savedUser.avatar||null;
  const submit = () => {
    setErr("");
    if(!email.trim()){setErr("Enter your email");return;}
    if(!password.trim()){setErr("Enter your password");return;}
    if(!savedUser||!savedUser.email){setErr("No account found on this device — create one first.");return;}
    if(email.trim().toLowerCase() !== savedEmail.toLowerCase()){setErr("Email not recognised on this device.");return;}
    if(password !== savedPwd){setErr("Incorrect password. Try again.");return;}
    setLoading(true);
    setTimeout(()=>{setLoading(false);onLogin();},600);
  };
  return (
    <div style={{minHeight:"100vh",background:lsGet("dark",false)?"#0E0E0E":"#F4F6F8",display:"flex",flexDirection:"column",fontFamily:"'Plus Jakarta Sans',sans-serif"}}>
      <style>{GS}</style>
      <div style={{display:"flex",alignItems:"center",padding:"52px 24px 0",gap:12}}>
        <button type="button" onClick={onBack} style={{background:lsGet("dark",false)?"#1A1A1A":"#fff",border:`1px solid ${lsGet("dark",false)?"#333":"#E0E0E0"}`,borderRadius:12,width:44,height:44,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",flexShrink:0}}>
          <Icon name="back" size={20} color={lsGet("dark",false)?"#fff":"#666"}/>
        </button>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <div style={{width:36,height:36,borderRadius:12,background:"linear-gradient(135deg,#0FA958,#00C853)",display:"flex",alignItems:"center",justifyContent:"center"}}><Icon name="naira" size={18} color="#fff" sw={2}/></div>
          <span style={{fontSize:17,fontWeight:900,color:"#121212"}}>NairaCoach</span>
        </div>
      </div>
      <div style={{margin:"28px 24px 0",borderRadius:24,background:lsGet("dark",false)?"#1A1A1A":"#fff",padding:24,border:`1px solid ${lsGet("dark",false)?"#2A2A2A":"#E8EDF0"}`,boxShadow:"0 4px 24px rgba(0,0,0,0.06)",animation:"fadeUp 0.35s ease both"}}>
        {!noSavedUser&&savedUser&&savedUser.name&&(
          <div style={{display:"flex",alignItems:"center",gap:14,marginBottom:24,paddingBottom:20,borderBottom:"1px solid #F0F4F0"}}>
            <div style={{width:56,height:56,borderRadius:"50%",background:"linear-gradient(135deg,#0FA958,#00C853)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,fontWeight:900,color:"#fff",flexShrink:0,overflow:"hidden",border:"2.5px solid #0FA958"}}>
              {avatar?<img src={avatar} style={{width:"100%",height:"100%",objectFit:"cover"}} alt="p"/>:first[0]}
            </div>
            <div>
              <p style={{fontSize:11,color:"#6B7280",fontWeight:600,marginBottom:2}}>Welcome back 👋</p>
              <p style={{fontSize:18,fontWeight:900,color:lsGet("dark",false)?"#fff":"#121212"}}>{savedUser.name}</p>
              <p style={{fontSize:12,color:"#6B7280"}}>{savedUser.email}</p>
            </div>
          </div>
        )}
        {noSavedUser&&<div style={{marginBottom:20}}><p style={{fontSize:22,fontWeight:900,color:lsGet("dark",false)?"#fff":"#121212",marginBottom:4}}>Sign In</p><p style={{fontSize:13,color:"#6B7280"}}>Enter your account credentials</p></div>}
        {noSavedUser&&(
          <div style={{marginBottom:14}}>
            <label style={{fontSize:13,fontWeight:700,color:lsGet("dark",false)?"#aaa":"#555",display:"block",marginBottom:7}}>Email Address</label>
            <input value={email} onChange={e=>{setEmail(e.target.value);setErr("");}} type="email" placeholder="you@email.com" style={{width:"100%",padding:"14px 16px",borderRadius:14,border:`1.5px solid ${err?"#FF6B6B":lsGet("dark",false)?"#333":"#E0E0E0"}`,fontSize:15,outline:"none",fontFamily:"'Plus Jakarta Sans',sans-serif",background:lsGet("dark",false)?"#2A2A2A":"#F7F9FB",color:lsGet("dark",false)?"#fff":"#121212"}}/>
          </div>
        )}
        <div style={{marginBottom:err?8:16}}>
          <label style={{fontSize:13,fontWeight:700,color:"#555",display:"block",marginBottom:7}}>Password</label>
          <div style={{position:"relative"}}>
            <input value={password} onChange={e=>{setPassword(e.target.value);setErr("");}} onKeyDown={e=>e.key==="Enter"&&submit()} type={showPwd?"text":"password"} placeholder="Enter your password" autoFocus style={{width:"100%",padding:"14px 48px 14px 16px",borderRadius:14,border:`1.5px solid ${err?"#FF6B6B":"#E0E0E0"}`,fontSize:15,outline:"none",fontFamily:"'Plus Jakarta Sans',sans-serif",background:"#F7F9FB",color:"#121212",transition:"border 0.2s"}}/>
            <button type="button" onClick={()=>setShowPwd(v=>!v)} style={{position:"absolute",right:14,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",cursor:"pointer",padding:0,lineHeight:0}}>
              <Icon name={showPwd?"eyeoff":"eye"} size={18} color="#aaa"/>
            </button>
          </div>
        </div>
        {err&&<p style={{fontSize:13,color:"#FF6B6B",marginBottom:12,fontWeight:600,display:"flex",alignItems:"center",gap:6}}><Icon name="warn" size={14} color="#FF6B6B"/> {err}</p>}
        <button type="button" onClick={submit} style={{width:"100%",padding:16,borderRadius:16,background:loading?"#ccc":"linear-gradient(135deg,#0FA958,#00C853)",border:"none",color:"#fff",fontWeight:900,fontSize:16,cursor:loading?"not-allowed":"pointer",boxShadow:loading?"none":"0 6px 24px rgba(15,169,88,0.35)",transition:"all 0.3s",display:"flex",alignItems:"center",justifyContent:"center",gap:10,fontFamily:"'Plus Jakarta Sans',sans-serif"}}>
          {loading?<><span style={{width:18,height:18,borderRadius:"50%",border:"2px solid #fff",borderTopColor:"transparent",animation:"spin 0.8s linear infinite",display:"inline-block"}}/> Signing in...</>:"Sign In \u2192"}
        </button>
        <p style={{fontSize:12,color:"#6B7280",textAlign:"center",marginTop:14,lineHeight:1.6}}>
          {noSavedUser?"Don't have an account? ":"Forgot your password? "}
          <button type="button" onClick={onBack} style={{background:"none",border:"none",color:"#0FA958",fontWeight:700,fontSize:12,cursor:"pointer",padding:0,fontFamily:"'Plus Jakarta Sans',sans-serif"}}>
            {noSavedUser?"Create one \u2192":"Go back"}
          </button>
        </p>
      </div>
    </div>
  );
}

/* ════════════════════════════════════════════════════════════
   SPLASH
══════════════════════════════════════════════════════════════ */
function Splash({onDone}) {
  const [idx,setIdx]=useState(0);
  const [out,setOut]=useState(false);
  const s=SLIDES[idx];
  const goNext=useCallback(()=>{
    if(idx<SLIDES.length-1){setOut(true);setTimeout(()=>{setIdx(i=>i+1);setOut(false);},280);}
    else onDone();
  },[idx,onDone]);
  return (
    <div style={{minHeight:"100vh",background:s.bg,display:"flex",flexDirection:"column",transition:"background 0.7s ease",fontFamily:"'Plus Jakarta Sans',sans-serif",overflow:"hidden"}}>
      <style>{GS}</style>
      <div style={{padding:"52px 28px 0",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div style={{display:"flex",gap:6}}>
          {SLIDES.map((_,i)=>(
            <div key={i} style={{height:4,borderRadius:2,background:"rgba(255,255,255,0.9)",width:idx===i?28:6,transition:"all 0.35s",opacity:idx===i?1:0.35}}/>
          ))}
        </div>
        <button onClick={onDone} style={{background:"rgba(255,255,255,0.15)",border:"1px solid rgba(255,255,255,0.25)",color:"#fff",padding:"7px 18px",borderRadius:20,fontSize:13,fontWeight:700,cursor:"pointer"}}>Skip</button>
      </div>
      <div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"0 36px",textAlign:"center",opacity:out?0:1,transform:out?"translateY(18px)":"none",transition:"all 0.28s"}}>
        <div style={{fontSize:96,marginBottom:32,lineHeight:1}}>{s.em}</div>
        <h1 style={{fontSize:34,fontWeight:900,color:"#fff",lineHeight:1.2,marginBottom:16,whiteSpace:"pre-line",letterSpacing:-0.5}}>{s.title}</h1>
        <p style={{fontSize:16,color:"rgba(255,255,255,0.82)",lineHeight:1.75,maxWidth:300}}>{s.sub}</p>
      </div>
      <div style={{padding:"0 28px 56px"}}>
        <button onClick={goNext} style={{width:"100%",padding:"18px",borderRadius:20,background:"rgba(255,255,255,0.95)",border:"none",color:"#0A5C30",fontWeight:900,fontSize:17,cursor:"pointer",boxShadow:"0 12px 40px rgba(0,0,0,0.2)"}}>
          {idx<SLIDES.length-1?"Next →":"Get Started 🚀"}
        </button>
        {idx===SLIDES.length-1&&<SplashAdminBtn/>}
      </div>
    </div>
  );
}

/* ════════════════════════════════════════════════════════════
   REGISTRATION
══════════════════════════════════════════════════════════════ */
function Registration({onComplete, onBack}) {
  const [step,setStep]=useState(0);
  const [vis,setVis]=useState(true);
  const [dir,setDir]=useState(1);
  const [showPwd,setShowPwd]=useState(false);
  const [form,setForm]=useState({name:"",email:"",phone:"",password:"",age:"",occupation:"",country:"Nigeria",state:"",lga:"",skills:[],incomeRange:"",savingsTarget:"",habit:"",agreed:false});
  const [err,setErr]=useState({});
  const TOTAL=5;
  const go=(n,d)=>{setDir(d);setVis(false);setTimeout(()=>{setStep(n);setVis(true);},250);};
  const upd=(k,v)=>setForm(f=>({...f,[k]:v}));
  const toggleSkill=s=>setForm(f=>({...f,skills:f.skills.includes(s)?f.skills.filter(x=>x!==s):[...f.skills,s]}));
  const isDark=lsGet("dark",false);
  const inpStyle=(f)=>({width:"100%",padding:"14px 16px",borderRadius:14,border:`1.5px solid ${err[f]?"#FF6B6B":isDark?"#333":"#E0E0E0"}`,fontSize:15,outline:"none",fontFamily:"'Plus Jakarta Sans',sans-serif",background:isDark?"#1A1A1A":"#fff",color:isDark?"#fff":"#121212",display:"block"});
  const lbl={fontSize:13,fontWeight:700,color:isDark?"#aaa":"#555",display:"block",marginBottom:6};
  const validate=()=>{
    const e={};
    if(step===0){if(!form.name.trim())e.name="Required";if(!form.email.includes("@"))e.email="Invalid email";if(form.password.length<6)e.password="Min 6 chars";if(!form.phone.trim())e.phone="Required";}
    if(step===1){if(!form.age||+form.age<13)e.age="Invalid age";if(!form.occupation)e.occupation="Required";if(!form.country)e.country="Required";const needsState=["Nigeria","Ghana","Kenya","United States","United Kingdom"].includes(form.country);if(needsState&&!form.state)e.state="Required";}
    if(step===2&&!form.incomeRange)e.incomeRange="Select one";
    if(step===3&&!form.habit)e.habit="Pick one";
    setErr(e);return !Object.keys(e).length;
  };
  const stateList=getStates(form.country);
  const lgas=getLGAs(form.state,form.country);
  const STEPS=[
    // Step 0
    <div key="s0">
      <p style={{fontSize:11,color:"#0FA958",fontWeight:800,letterSpacing:1,textTransform:"uppercase",marginBottom:8}}>Step 1 of 5 — Account</p>
      <h2 style={{fontSize:26,fontWeight:900,color:isDark?"#fff":"#121212",marginBottom:20}}>Create your account</h2>
      <div style={{background:"#FFF8E1",border:"1px solid #FFE082",borderRadius:12,padding:"10px 14px",marginBottom:18,display:"flex",gap:8}}>
        <Icon name="warn" size={16} color="#F57F17"/>
        <p style={{fontSize:12,color:"#5D4037",lineHeight:1.6,flex:1}}><strong>Note:</strong> Your name cannot be changed after registration. Enter it as you want it displayed.</p>
      </div>
      <div style={{marginBottom:14}}>
        <label style={lbl}>Full Name</label>
        <input value={form.name} onChange={e=>upd("name",e.target.value)} placeholder="Emmanuel Okafor" style={inpStyle("name")}/>
        {err.name&&<p style={{fontSize:12,color:"#FF6B6B",marginTop:4}}>{err.name}</p>}
      </div>
      <div style={{marginBottom:14}}>
        <label style={lbl}>Email Address</label>
        <input value={form.email} onChange={e=>upd("email",e.target.value)} placeholder="you@email.com" type="email" style={inpStyle("email")}/>
        {err.email&&<p style={{fontSize:12,color:"#FF6B6B",marginTop:4}}>{err.email}</p>}
      </div>
      <div style={{marginBottom:14}}>
        <label style={lbl}>Phone Number</label>
        <input value={form.phone} onChange={e=>upd("phone",e.target.value)} placeholder="08012345678" type="tel" style={inpStyle("phone")}/>
        {err.phone&&<p style={{fontSize:12,color:"#FF6B6B",marginTop:4}}>{err.phone}</p>}
      </div>
      <div>
        <label style={lbl}>Password</label>
        <div style={{position:"relative"}}>
          <input value={form.password} onChange={e=>upd("password",e.target.value)} type={showPwd?"text":"password"} placeholder="Min 6 characters" style={{...inpStyle("password"),paddingRight:46}}/>
          <button type="button" onClick={()=>setShowPwd(v=>!v)} style={{position:"absolute",right:14,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",cursor:"pointer",padding:0}}>
            <Icon name={showPwd?"eyeoff":"eye"} size={18} color="#aaa"/>
          </button>
        </div>
        {err.password&&<p style={{fontSize:12,color:"#FF6B6B",marginTop:4}}>{err.password}</p>}
      </div>
    </div>,
    // Step 1
    <div key="s1">
      <p style={{fontSize:11,color:"#0FA958",fontWeight:800,letterSpacing:1,textTransform:"uppercase",marginBottom:8}}>Step 2 of 5 — Personal</p>
      <h2 style={{fontSize:26,fontWeight:900,color:isDark?"#fff":"#121212",marginBottom:20}}>About yourself</h2>

      </div>

      <Sel label="Country" value={form.country} onChange={v=>{upd("country",v);upd("state","");upd("lga","");}} opts={COUNTRIES} err={err.country}/>
      {stateList.length>0&&<Sel label="State / Region" value={form.state} onChange={v=>{upd("state",v);upd("lga","");}} opts={stateList} placeholder="Select state/region" err={err.state}/>}
      {form.state&&<Sel label="City / LGA / Area" value={form.lga} onChange={v=>upd("lga",v)} opts={lgas} placeholder="Select area"/>}
      {!stateList.length&&<div style={{marginBottom:14}}><label style={lbl}>City</label><input value={form.lga} onChange={e=>upd("lga",e.target.value)} placeholder="Your city" style={inpStyle("")}/></div>}
      <div>
        <label style={lbl}>Your Skills (tap to select)</label>
        <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
          {SKILLS.map(s=>(
            <button key={s} type="button" onClick={()=>toggleSkill(s)} style={{padding:"8px 14px",borderRadius:20,border:`2px solid ${form.skills.includes(s)?"#0FA958":"#E0E0E0"}`,background:form.skills.includes(s)?"#0FA95812":(isDark?"#1A1A1A":"#fff"),color:form.skills.includes(s)?"#0FA958":(isDark?"#aaa":"#666"),fontWeight:700,fontSize:12,cursor:"pointer",transition:"all 0.2s"}}>{s}</button>

          {r}{form.incomeRange===r&&<Icon name="check" size={18} color="#0FA958"/>}

/* ── PIN PAGE ─────────────────────────────────────────────── */
function PinPage({S}) {
  var useState=React.useState,useRef=React.useRef;
  const {C,dark,pinSet,setPinSet,toast_show} = S;
  const [pin,setPin]=useState(["","","","",""]);
  const [conf,setConf]=useState(["","","","",""]);
  const [mode,setMode]=useState(pinSet?"done":"setup");
  const [bio,setBio]=useState(S.bioEnabled||false);
  const pRefs=useRef([]);const cRefs=useRef([]);
  const dig=(arr,setArr,refs,i,v)=>{if(!/^[0-9]?$/.test(v))return;const n=[...arr];n[i]=v;setArr(n);if(v&&i<4&&refs.current[i+1])refs.current[i+1].focus();};
  const save=()=>{const p=pin.join("");const c=conf.join("");if(p.length<5){toast_show("Enter all 5 digits");return;}if(p!==c){toast_show("PINs do not match");setConf(["","","","",""]);return;}setPinSet(true);setMode("done");toast_show("PIN set \uD83D\uDD10");};
  const Row=({arr,setArr,refs,label})=>(
    <div style={{marginBottom:24}}>
      <p style={{fontSize:13,fontWeight:700,color:C.sub,textAlign:"center",marginBottom:12}}>{label}</p>
      <div style={{display:"flex",gap:10,justifyContent:"center"}}>
        {arr.map((d,i)=><input key={i} ref={el=>refs.current[i]=el} value={d} type="password" inputMode="numeric" maxLength={1} onChange={e=>dig(arr,setArr,refs,i,e.target.value)} onKeyDown={e=>{if(e.key==="Backspace"&&!arr[i]&&i>0&&refs.current[i-1])refs.current[i-1].focus();}} style={{width:52,height:58,borderRadius:14,border:`2px solid ${d?"#0FA958":C.border}`,background:d?(dark?"#0A2B18":"#DFF7EA"):(dark?"#1A1A1A":C.card),textAlign:"center",fontSize:22,fontWeight:900,color:"#0FA958",outline:"none",fontFamily:"'Plus Jakarta Sans',sans-serif",transition:"all 0.2s"}}/>)}
      </div>
    </div>
  );
  if(mode==="done") return (
    <SubShell title="PIN & Biometric" onBack={()=>S.setSubPage(null)} C={C}>
      <div style={{textAlign:"center",padding:"40px 20px"}}>
        <div style={{fontSize:64,marginBottom:16}}>🔐</div>
        <p style={{fontSize:22,fontWeight:900,color:"#0FA958",marginBottom:8}}>PIN Active</p>
        <button type="button" onClick={()=>{setPin(["","","","",""]);setConf(["","","","",""]);setMode("setup");}} style={{padding:"12px 28px",borderRadius:12,background:"#0FA95820",border:"none",color:"#0FA958",fontWeight:700,fontSize:14,cursor:"pointer",fontFamily:"'Plus Jakarta Sans',sans-serif",marginBottom:24}}>Change PIN</button>
      </div>
      <div style={{background:C.card,borderRadius:16,padding:"0 16px",border:`1px solid ${C.border}`}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"16px 0"}}>
          <div style={{display:"flex",gap:10,alignItems:"center"}}><Icon name="fingerprint" size={20} color="#0FA958"/><div><p style={{fontSize:14,fontWeight:700,color:C.text}}>Biometric Login</p><p style={{fontSize:12,color:C.sub}}>Fingerprint or Face ID</p></div></div>
          <button type="button" onClick={()=>{setBio(v=>!v);toast_show(bio?"Biometric disabled":"Biometric enabled \uD83D\uDC46");}} style={{width:48,height:28,borderRadius:14,background:bio?"#0FA958":"#D0D0D0",border:"none",cursor:"pointer",position:"relative",transition:"background 0.3s"}}>
            <div style={{position:"absolute",top:3,left:bio?22:3,width:22,height:22,borderRadius:"50%",background:"#fff",transition:"left 0.3s",boxShadow:"0 1px 4px rgba(0,0,0,0.2)"}}/>
          </button>
        </div>
      </div>
    </SubShell>
  );
  return (
    <SubShell title="Set Your PIN" onBack={()=>S.setSubPage(null)} C={C}>
      <div style={{textAlign:"center",marginBottom:28}}>
        <div style={{width:64,height:64,borderRadius:20,background:"#0FA95820",display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 14px"}}><Icon name="lock" size={30} color="#0FA958"/></div>
        <p style={{fontSize:17,fontWeight:900,color:C.text,marginBottom:4}}>Set a 5-digit PIN</p>
        <p style={{fontSize:13,color:C.sub}}>Protects your NairaCoach account</p>
      </div>
      <Row arr={pin} setArr={setPin} refs={pRefs} label="Enter PIN"/>
      {pin.every(d=>d)&&<Row arr={conf} setArr={setConf} refs={cRefs} label="Confirm PIN"/>}
      <button type="button" onClick={save} style={{width:"100%",padding:16,borderRadius:14,background:"linear-gradient(135deg,#0FA958,#00C853)",border:"none",color:"#fff",fontWeight:800,fontSize:16,cursor:"pointer",minHeight:52,fontFamily:"'Plus Jakarta Sans',sans-serif"}}>Set PIN 🔐</button>
    </SubShell>
  );
}

/* ── ALL BADGES PAGE ──────────────────────────────────────── */
function AllBadgesPage({S}) {
  const {C,dark,badges,xp,level,lvlPct} = S;
  const [filter,setFilter]=useState("All");
  const cats=["All",...new Set(ALL_BADGES.map(b=>b.cat))];
  const filtB=badges.filter(b=>filter==="All"||b.cat===filter);
  const earned=badges.filter(b=>b.earned).length;
  return (
    <SubShell title="Badges & Achievements" onBack={()=>S.setSubPage(null)} C={C}>
      <div style={{background:"linear-gradient(135deg,#FFD93D,#FF8C42)",borderRadius:18,padding:20,marginBottom:16}}>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:12}}>
          <div><p style={{fontSize:11,fontWeight:700,color:"rgba(255,255,255,0.8)",textTransform:"uppercase",letterSpacing:1,marginBottom:4}}>Level</p><p style={{fontSize:36,fontWeight:900,color:"#fff",letterSpacing:-1}}>{level}</p></div>
          <div style={{textAlign:"right"}}><p style={{fontSize:11,fontWeight:700,color:"rgba(255,255,255,0.8)"}}>Total XP</p><p style={{fontSize:24,fontWeight:900,color:"#fff"}}>{xp} ⚡</p></div>
        </div>
        <div style={{height:8,borderRadius:4,background:"rgba(255,255,255,0.25)"}}><div style={{height:"100%",borderRadius:4,width:`${lvlPct}%`,background:"rgba(255,255,255,0.9)",transition:"width 0.8s"}}/></div>
        <p style={{fontSize:12,color:"rgba(255,255,255,0.8)",marginTop:6}}>{lvlPct}/100 XP to Level {level+1}</p>
      </div>
      <div style={{display:"flex",justifyContent:"space-between",marginBottom:10}}>
        <p style={{fontSize:14,fontWeight:700,color:C.text}}>{earned}/{ALL_BADGES.length} earned</p>
        <p style={{fontSize:13,color:C.sub,fontWeight:600}}>{ALL_BADGES.length-earned} locked</p>
      </div>
      <div style={{display:"flex",gap:7,overflowX:"auto",paddingBottom:10,marginBottom:14}}>
        {cats.map(cat=><button key={cat} type="button" onClick={()=>setFilter(cat)} style={{flexShrink:0,padding:"7px 14px",borderRadius:20,border:`1.5px solid ${filter===cat?"#0FA958":C.border}`,background:filter===cat?"#0FA958":C.card,color:filter===cat?"#fff":C.sub,fontWeight:700,fontSize:12,cursor:"pointer",fontFamily:"'Plus Jakarta Sans',sans-serif"}}>{cat}</button>)}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
        {filtB.map(b=>(
          <div key={b.id} style={{borderRadius:18,padding:18,background:b.earned?(dark?"#1A1A1A":"#fff"):(dark?"#141414":"#F7F9FB"),border:`1.5px solid ${b.earned?b.color+"55":C.border}`,display:"flex",flexDirection:"column",alignItems:"center",gap:8,opacity:b.earned?1:0.5,position:"relative"}}>
            {b.earned&&<div style={{position:"absolute",top:10,right:10,width:18,height:18,borderRadius:"50%",background:"#0FA958",display:"flex",alignItems:"center",justifyContent:"center"}}><Icon name="check" size={10} color="#fff" sw={3}/></div>}
            <div style={{width:54,height:54,borderRadius:16,background:b.earned?b.color+"22":"#F0F0F0",display:"flex",alignItems:"center",justifyContent:"center",fontSize:26}}>{b.em}</div>
            <p style={{fontSize:13,fontWeight:800,color:b.earned?C.text:C.sub,textAlign:"center",lineHeight:1.3}}>{b.title}</p>
            <p style={{fontSize:11,color:C.sub,textAlign:"center",lineHeight:1.4}}>{b.desc}</p>
            <span style={{fontSize:10,fontWeight:700,color:b.earned?b.color:"#aaa",background:b.earned?b.color+"15":C.border,borderRadius:6,padding:"2px 8px"}}>{b.earned?"✓ Earned":"🔒 Locked"}</span>
          </div>
        ))}
      </div>
    </SubShell>
  );
}

</script>

<script type="text/babel" data-presets="react">
var useState=React.useState,useEffect=React.useEffect,useRef=React.useRef,useCallback=React.useCallback;
/* ══ HOME TAB ══════════════════════════════════════════════ */
function HomeTab({S}) {
  const {C,dark,user,name,hour,level,lvlPct,xp,balance,totalIncome,totalSpend,savingsRate,
    expenses,goals,streak,doneTasks,aiTxt,aiLoad,INSIGHTS,insightI,catTotals,budgets,
    hasSeenTip,setHasSeenTip,seenTours,dismissTour,themeKey,setThemeKey,darkPal,setDarkPal,lightPal,setLightPal,setNotifOpen,setTab,setShowAdd,setShowAddIncome,setShowAllExpenses,setShowBudgets,
    openEditExpense,deleteExpense,fetchAI,doTask} = S;
  return (
    <div style={{padding:"0 16px"}}>
      {!seenTours.home&&<PageTour page="home" C={C} dark={dark} onDismiss={()=>dismissTour("home")}/>}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",paddingTop:20,marginBottom:16,animation:"fadeUp 0.3s ease both"}}>
        <div>
          <p style={{fontSize:13,color:C.sub,fontWeight:500}}>{hour<12?"Good morning":hour<17?"Good afternoon":"Good evening"} 👋</p>
          <p style={{fontSize:20,fontWeight:900,color:C.text}}>{name}{streak>2&&<span style={{fontSize:14,fontWeight:700,color:"#FF8C42",marginLeft:6}}>🔥{streak}</span>}</p>
        </div>
        <div style={{display:"flex",gap:10,alignItems:"center"}}>
          <div style={{background:"linear-gradient(135deg,#0FA958,#00C853)",borderRadius:20,padding:"5px 12px",display:"flex",alignItems:"center",gap:4}}>
            <Icon name="zap" size={12} color="#fff" sw={2.5}/><span style={{fontSize:12,fontWeight:800,color:"#fff"}}>Lv {level}</span>
          </div>
          <button type="button" onClick={()=>setNotifOpen(true)} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,width:44,height:44,display:"flex",alignItems:"center",justifyContent:"center",position:"relative",cursor:"pointer"}}>
            <Icon name="bell" size={20} color={C.sub}/>
            <span style={{position:"absolute",top:9,right:9,width:7,height:7,background:"#FF6B6B",borderRadius:"50%",border:`2px solid ${C.card}`}}/>
          </button>
          <button type="button" onClick={()=>setTab("profile")} style={{width:44,height:44,borderRadius:"50%",background:"linear-gradient(135deg,#0FA958,#00C853)",border:"none",cursor:"pointer",overflow:"hidden",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:900,color:"#fff",fontSize:18}}>
            {user&&user.avatar?<img src={user.avatar} style={{width:"100%",height:"100%",objectFit:"cover"}} alt="p"/>:name[0]}
          </button>
        </div>
      </div>

      {/* Balance Card */}
      <div style={{borderRadius:22,padding:22,marginBottom:14,background:`linear-gradient(135deg,${C.accent} 0%,${C.accentB} 60%,${C.accentB}88 100%)`,position:"relative",overflow:"hidden",animation:"fadeUp 0.3s ease 0.05s both"}}>
        <div style={{position:"absolute",top:-40,right:-40,width:130,height:130,borderRadius:"50%",background:"rgba(255,255,255,0.07)"}}/>
        <p style={{fontSize:11,color:"rgba(255,255,255,0.8)",fontWeight:700,marginBottom:4,letterSpacing:1.2,textTransform:"uppercase"}}>Net Balance</p>
        <p style={{fontSize:38,fontWeight:900,color:"#fff",letterSpacing:-2,marginBottom:12}}>
          {fmt(Math.abs(balance))}<span style={{fontSize:16,fontWeight:600,marginLeft:6}}>{balance>=0?"saved":"overspent"}</span>
        </p>
        <div style={{display:"flex",gap:8,marginBottom:12}}>
          {[["\u2191 Income",fmt(totalIncome)],["\u2193 Spend",fmt(totalSpend)],["Savings",savingsRate+"%"]].map(([l,v])=>(
            <div key={l} style={{flex:1,background:"rgba(255,255,255,0.15)",borderRadius:12,padding:"8px 10px"}}>
              <p style={{fontSize:10,color:"rgba(255,255,255,0.75)",fontWeight:600,marginBottom:2}}>{l}</p>
              <p style={{fontSize:13,fontWeight:800,color:"#fff"}}>{v}</p>
            </div>
          ))}
        </div>
        <div style={{display:"flex",gap:8}}>
          <button type="button" onClick={()=>{setHasSeenTip(true);setShowAddIncome(true);}} style={{flex:1,padding:"9px",borderRadius:10,background:"rgba(255,255,255,0.25)",border:"1px solid rgba(255,255,255,0.3)",color:"#fff",fontWeight:700,fontSize:12,cursor:"pointer",fontFamily:"'Plus Jakarta Sans',sans-serif"}}>+ Income</button>
          <button type="button" onClick={()=>{setHasSeenTip(true);setShowAdd(true);}} style={{flex:1,padding:"9px",borderRadius:10,background:"rgba(255,255,255,0.25)",border:"1px solid rgba(255,255,255,0.3)",color:"#fff",fontWeight:700,fontSize:12,cursor:"pointer",fontFamily:"'Plus Jakarta Sans',sans-serif"}}>+ Expense</button>
        </div>
      </div>

      {/* XP Bar */}
      <div style={{background:C.card,borderRadius:14,padding:"12px 14px",marginBottom:12,border:`1px solid ${C.border}`,display:"flex",alignItems:"center",gap:12,animation:"fadeUp 0.3s ease 0.1s both"}}>
        <div style={{width:38,height:38,borderRadius:11,background:"linear-gradient(135deg,#FFD93D,#FF8C42)",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}><Icon name="zap" size={20} color="#fff" sw={2}/></div>
        <div style={{flex:1}}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
            <span style={{fontSize:12,fontWeight:700,color:C.text}}>Level {level} · {xp} XP</span>
            <span style={{fontSize:11,color:C.sub}}>{lvlPct}/100</span>
          </div>
          <div style={{height:6,borderRadius:3,background:C.border,overflow:"hidden"}}><div style={{height:"100%",borderRadius:3,width:`${lvlPct}%`,background:"linear-gradient(90deg,#FFD93D,#FF8C42)",transition:"width 0.8s"}}/></div>
        </div>
      </div>

      {/* AI Insight */}
      <div style={{borderRadius:16,padding:16,marginBottom:14,background:C.mint,border:`1px solid ${dark?"#1A3D2A":"#B8EDD1"}`,animation:"fadeUp 0.3s ease 0.15s both"}}>
        <div style={{display:"flex",alignItems:"flex-start",gap:10}}>
          <div style={{width:34,height:34,borderRadius:10,background:"#0FA958",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}><Icon name="spark" size={17} color="#fff"/></div>
          <div style={{flex:1}}>
            <p style={{fontSize:11,fontWeight:800,color:C.mintT,marginBottom:4,letterSpacing:0.9,textTransform:"uppercase"}}>AI Insight</p>
            <p style={{fontSize:13,color:dark?"#C8F0DA":"#1A5C35",lineHeight:1.7,fontWeight:500}}>{aiTxt||INSIGHTS[insightI]}</p>
            <button type="button" onClick={fetchAI} style={{marginTop:8,background:"none",border:"none",color:C.mintT,fontSize:12,fontWeight:800,padding:0,cursor:"pointer",fontFamily:"'Plus Jakarta Sans',sans-serif"}}>
              {aiLoad?<span style={{animation:"pulse 1s infinite"}}>Thinking...</span>:"Refresh insight →"}
            </button>
          </div>
        </div>
      </div>


      {/* Budget Overview */}
      {Object.keys(budgets).filter(k=>budgets[k]>0).length>0&&(

          </div>
          {Object.entries(budgets).filter(([,v])=>v>0).slice(0,4).map(([cat,limit])=>{
            const spent=catTotals[cat]||0;

            const over=spent>limit;
            const warn=pct>=0.8&&!over;
            const col=CAT_COLORS[cat]||"#0FA958";
            return (
              <div key={cat} style={{marginBottom:8,padding:"10px 14px",borderRadius:12,background:C.card,border:`1px solid ${over?"#FF6B6B44":warn?"#FFD93D44":C.border}`}}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:5,alignItems:"center"}}>
                  <div style={{display:"flex",alignItems:"center",gap:7}}>
                    <div style={{width:8,height:8,borderRadius:"50%",background:col,flexShrink:0}}/>
                    <span style={{fontSize:13,fontWeight:700,color:C.text}}>{cat}</span>

                  <span style={{fontSize:12,fontWeight:800,color:over?"#FF6B6B":warn?"#FF8C42":C.sub}}>
                    {fmt(spent)} / {fmt(limit)}

        </div>
        <div style={{display:"flex",gap:10,overflowX:"auto",paddingBottom:4}}>
          {DAILY_TASKS.map(task=>{
            const done=doneTasks.includes(task.id);
            return (
              <button key={task.id} type="button" onClick={()=>doTask(task)} style={{minWidth:138,flexShrink:0,borderRadius:16,padding:"14px 12px",background:done?(dark?"#0A2B18":"#DFF7EA"):C.card,border:`1.5px solid ${done?"#0FA958":C.border}`,cursor:"pointer",textAlign:"left",transition:"all 0.2s",opacity:done?0.75:1,fontFamily:"'Plus Jakarta Sans',sans-serif"}}>
                <div style={{width:30,height:30,borderRadius:9,background:done?"#0FA95820":C.border+"66",display:"flex",alignItems:"center",justifyContent:"center",marginBottom:8}}>
                  {done?<Icon name="check" size={15} color="#0FA958" sw={2.5}/>:<Icon name={task.icon} size={15} color={C.sub}/>}

                <p style={{fontSize:11,fontWeight:700,color:done?C.mintT:C.text,lineHeight:1.4,marginBottom:4}}>{task.title}</p>
                <span style={{fontSize:11,fontWeight:600,color:done?"#0FA958":"#FF8C42"}}>+{task.xp} XP</span>
              </button>
            );
          })}
        </div>
      </div>

      {/* Quick actions */}
      <div style={{display:"flex",gap:9,marginBottom:14,animation:"fadeUp 0.3s ease 0.22s both"}}>
        {[{l:"Analytics",i:"chart",a:()=>setTab("analytics")},{l:"Hustles",i:"bulb",a:()=>setTab("hustles")},{l:"Goals",i:"target",a:()=>setTab("analytics")},{l:"Badges",i:"trophy",a:()=>S.setSubPage("allBadges")}].map((x,i)=>(
          <button key={i} type="button" onClick={x.a} style={{flex:1,borderRadius:13,padding:"10px 4px",background:C.card,border:`1px solid ${C.border}`,display:"flex",flexDirection:"column",alignItems:"center",gap:5,cursor:"pointer",fontFamily:"'Plus Jakarta Sans',sans-serif"}}>
            <Icon name={x.i} size={20} color="#0FA958"/><span style={{fontSize:10,fontWeight:700,color:C.text}}>{x.l}</span>
          </button>
        ))}
      </div>

      {/* First-visit tooltip — shows only when no expenses logged yet */}
      {!hasSeenTip&&expenses.length===0&&(
        <div style={{position:"fixed",bottom:144,right:"calc(50% - 215px + 8px)",zIndex:500,animation:"fadeUp 0.4s ease 0.8s both",pointerEvents:"auto"}}>
          {/* Tooltip card */}

/* ══ ANALYTICS TAB ══════════════════════════════════════════ */

            ):(
              <div style={{background:C.card,borderRadius:16,padding:20,marginBottom:14,border:`2px dashed ${C.border}`,textAlign:"center"}}>
                <div style={{fontSize:32,marginBottom:8}}>🎯</div>
                <p style={{fontSize:14,fontWeight:700,color:C.text,marginBottom:4}}>No budgets set</p>
                <p style={{fontSize:13,color:C.sub,lineHeight:1.6,marginBottom:12}}>Set monthly limits per category.</p>
                <button type="button" onClick={()=>setShowBudgets(true)} style={{padding:"10px 20px",borderRadius:12,background:"linear-gradient(135deg,#0FA958,#00C853)",border:"none",color:"#fff",fontWeight:700,fontSize:14,cursor:"pointer",fontFamily:"'Plus Jakarta Sans',sans-serif"}}>Set Budgets</button>
              </div>
            )}

          {/* Income list */}
          {incomes.length>0&&(
            <div style={{background:C.card,borderRadius:16,padding:20,marginBottom:14,border:`1px solid ${C.border}`}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
                <p style={{fontSize:14,fontWeight:800,color:C.text}}>Income Entries</p>
                <button type="button" onClick={()=>setShowAddIncome(true)} style={{background:"#0FA95820",border:"none",color:"#0FA958",fontWeight:700,fontSize:12,borderRadius:8,padding:"5px 11px",cursor:"pointer",fontFamily:"'Plus Jakarta Sans',sans-serif"}}>+ Add</button>
              </div>
              {incomes.slice(0,5).map((inc,i)=>(
                <div key={inc.id} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 0",borderBottom:i<Math.min(4,incomes.length-1)?`1px solid ${C.border}`:"none"}}>
                  <div style={{width:34,height:34,borderRadius:10,background:"#0FA95820",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}><Icon name="up" size={16} color="#0FA958"/></div>
                  <div style={{flex:1}}><p style={{fontSize:13,fontWeight:700,color:C.text}}>{inc.source}</p><p style={{fontSize:11,color:C.sub}}>{inc.note} · {inc.date}</p></div>
                  <p style={{fontSize:13,fontWeight:800,color:"#0FA958"}}>+{fmt(inc.amount)}</p>
                  <button type="button" onClick={()=>deleteIncome(inc.id)} style={{background:"none",border:"none",padding:4,cursor:"pointer"}}><Icon name="trash" size={13} color="#FF6B6B"/></button>
                </div>
              ))}
            </div>
          )}
        </>
      )}

      {/* Goals */}
      <div style={{background:C.card,borderRadius:16,padding:20,border:`1px solid ${C.border}`}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
          <p style={{fontSize:14,fontWeight:800,color:C.text}}>Goals 🎯</p>
          <button type="button" onClick={()=>{setEditGoal(null);setGoalForm({title:"",target:"",current:"",deadline:""});setShowGoalForm(true);}} style={{background:"#0FA95820",border:"none",color:"#0FA958",fontWeight:700,fontSize:12,borderRadius:8,padding:"6px 12px",cursor:"pointer",fontFamily:"'Plus Jakarta Sans',sans-serif"}}>+ Add</button>
        </div>
        {goals.length===0?(
          <div style={{textAlign:"center",padding:"20px 0"}}><div style={{fontSize:32,marginBottom:8}}>🎯</div><p style={{fontSize:13,color:C.sub}}>No goals yet — add your first financial goal!</p></div>
        ):(
          goals.map(g=>(
            <div key={g.id} style={{marginBottom:12,padding:14,borderRadius:12,background:g.met?(dark?"#0A2B18":"#DFF7EA"):C.card2,border:g.met?"1px solid #0FA95844":`1px solid ${C.border}`}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:5}}>
                <span style={{fontSize:13,fontWeight:700,color:g.met?"#0FA958":C.text,flex:1,marginRight:8}}>{g.title}</span>
                <div style={{display:"flex",gap:6,alignItems:"center",flexShrink:0}}>
                  {!g.met&&<span style={{fontSize:11,color:C.sub}}>{fmt(g.current)}/{fmt(g.target)}</span>}
                  {g.met&&<Icon name="check" size={16} color="#0FA958"/>}
                  <button type="button" onClick={()=>{setEditGoal(g);setGoalForm({title:g.title,target:String(g.target),current:String(g.current),deadline:g.deadline||""});setShowGoalForm(true);}} style={{background:"none",border:"none",padding:2,cursor:"pointer"}}><Icon name="edit" size={13} color={C.sub}/></button>
                  <button type="button" onClick={()=>deleteGoal(g.id)} style={{background:"none",border:"none",padding:2,cursor:"pointer"}}><Icon name="trash" size={13} color="#FF6B6B"/></button>

              </div>
              {g.deadline&&<p style={{fontSize:11,color:C.sub,marginBottom:5}}>📅 {g.deadline}</p>}
              {!g.met&&<>
                <div style={{height:7,borderRadius:4,background:dark?"#2A2A2A":"#F0F0F0",overflow:"hidden",marginBottom:8}}><div style={{height:"100%",borderRadius:4,width:`${Math.min((g.current/g.target)*100,100)}%`,background:"linear-gradient(90deg,#0FA958,#00C853)",transition:"width 1.2s"}}/></div>
                <div style={{display:"flex",gap:10}}>
                  <button type="button" onClick={()=>completeGoal(g)} style={{background:"none",border:"none",color:"#0FA958",fontSize:11,fontWeight:700,padding:0,cursor:"pointer",fontFamily:"'Plus Jakarta Sans',sans-serif"}}>Mark complete →</button>
                  <button type="button" onClick={()=>{const a=prompt("Add how much? (\u20a6)");if(a&&+a>0)addToGoal(g.id,+a);}} style={{background:"none",border:"none",color:C.sub,fontSize:11,fontWeight:600,padding:0,cursor:"pointer",fontFamily:"'Plus Jakarta Sans',sans-serif"}}>+ Add funds</button>
                </div>
              </>}
            </div>
          ))
        )}
      </div>
    </div>
  );
}

/* ══ HUSTLES TAB ════════════════════════════════════════════ */
function HustlesTab({S}) {
  const {C,dark,activeHustles,savedHustles,completedHustles,completedIds,searchQ,setSearchQ,hustleCat,setHustleCat,
    filtHustles,hustleCats,getActiveSlots,getMaxSlots,getHustleProgress,
    canStartHustle,toggleSave,setShowHustle,setViewActiveHustle,seenTours,dismissTour} = S;
  const usedSlots=getActiveSlots();
  const maxSlots=getMaxSlots();
  return (
    <div style={{padding:"0 16px 24px"}}>
      {!seenTours.hustles&&<PageTour page="hustles" C={C} dark={dark} onDismiss={()=>dismissTour("hustles")}/>}
      <div style={{paddingTop:20,marginBottom:14}}>
        <p style={{fontSize:22,fontWeight:900,color:C.text,marginBottom:4}}>Side Hustles 💡</p>
        <p style={{fontSize:13,color:C.sub}}>Find your next income stream</p>
      </div>

      {/* Active hustles panel */}
      {activeHustles.length>0&&(
        <div style={{marginBottom:18}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
            <p style={{fontSize:15,fontWeight:800,color:C.text}}>Active Hustles 🔥</p>
            <span style={{fontSize:12,color:C.sub,fontWeight:600}}>Slots: {usedSlots}/{maxSlots}</span>
          </div>
          {activeHustles.map(ah=>{
            const h=ALL_HUSTLES.find(x=>x.id===ah.id);if(!h)return null;
            const prog=getHustleProgress(ah);
            const dc=h.diff==="Easy"?"#4CAF50":h.diff==="Medium"?"#FF8C42":"#E74C3C";
            return (
              <button key={ah.id} type="button" onClick={()=>setViewActiveHustle(ah)} style={{width:"100%",borderRadius:18,marginBottom:10,background:C.card,border:`2px solid ${dc}44`,cursor:"pointer",overflow:"hidden",textAlign:"left",fontFamily:"'Plus Jakarta Sans',sans-serif",padding:0}}>
                <div style={{height:4,background:`linear-gradient(90deg,${dc},${dc}88)`}}/>
                <div style={{padding:"14px 16px"}}>
                  <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}>
                    <span style={{fontSize:26}}>{h.em}</span>
                    <div style={{flex:1}}>
                      <p style={{fontSize:15,fontWeight:800,color:C.text}}>{h.title}</p>
                      <p style={{fontSize:11,color:C.sub}}>{prog.done}/{prog.total} steps · Started {ah.startedAt}</p>
                    </div>
                    <span style={{fontSize:16,fontWeight:900,color:dc}}>{prog.pct}%</span>
                  </div>
                  <div style={{height:8,borderRadius:4,background:dark?"#2A2A2A":"#F0F0F0",overflow:"hidden"}}>
                    <div style={{height:"100%",borderRadius:4,background:`linear-gradient(90deg,${dc},${dc}BB)`,width:`${prog.pct}%`,transition:"width 0.6s"}}/>
                  </div>
                </div>
              </button>
            );
          })}
        </div>
      )}

      {/* Slot indicator */}
      <div style={{background:C.card,borderRadius:12,padding:"10px 14px",marginBottom:14,border:`1px solid ${C.border}`,display:"flex",alignItems:"center",gap:10}}>
        <div style={{display:"flex",gap:5}}>
          {Array.from({length:maxSlots}).map((_,i)=>(
            <div key={i} style={{width:20,height:20,borderRadius:6,background:i<usedSlots?"#0FA958":C.border,transition:"background 0.3s",display:"flex",alignItems:"center",justifyContent:"center"}}>
              {i<usedSlots&&<Icon name="check" size={11} color="#fff" sw={3}/>}
            </div>
          ))}
        </div>
        <p style={{fontSize:12,color:C.sub,flex:1}}>
          {usedSlots===0?"Start up to 3 Easy, 1 Medium, or 1 Hard hustle — Easy costs 1 slot, Hard costs all 3":
           usedSlots>=maxSlots?"All slots used — complete a hustle to free space":
           `${maxSlots-usedSlots} slot${maxSlots-usedSlots!==1?"s":""} available`}
        </p>
      </div>

      {/* Difficulty legend */}
      <div style={{display:"flex",gap:8,marginBottom:14}}>
        {[{d:"Easy",c:"#4CAF50",s:1},{d:"Medium",c:"#FF8C42",s:2},{d:"Hard",c:"#E74C3C",s:3}].map(x=>(
          <div key={x.d} style={{flex:1,borderRadius:12,padding:"8px 10px",background:x.c+"12",border:`1px solid ${x.c}33`,textAlign:"center"}}>
            <p style={{fontSize:11,fontWeight:800,color:x.c}}>{x.d}</p>
            <p style={{fontSize:10,color:C.sub}}>{x.s} slot{x.s!==1?"s":""}</p>
          </div>
        ))}
      </div>

      {/* Search */}
      <div style={{position:"relative",marginBottom:12}}>
        <div style={{position:"absolute",left:14,top:"50%",transform:"translateY(-50%)"}}><Icon name="search" size={18} color={C.sub}/></div>
        <input value={searchQ} onChange={e=>setSearchQ(e.target.value)} placeholder="Search hustles..." style={{width:"100%",padding:"12px 16px 12px 44px",borderRadius:14,border:`1px solid ${C.border}`,background:C.card,color:C.text,fontSize:14,outline:"none",fontFamily:"'Plus Jakarta Sans',sans-serif"}}/>
      </div>

      {/* Category filters */}
      <div style={{display:"flex",gap:8,overflowX:"auto",paddingBottom:8,marginBottom:14}}>
        {hustleCats.map(cat=><button key={cat} type="button" onClick={()=>setHustleCat(cat)} style={{flexShrink:0,padding:"7px 14px",borderRadius:20,border:`1.5px solid ${hustleCat===cat?"#0FA958":C.border}`,background:hustleCat===cat?"#0FA958":C.card,color:hustleCat===cat?"#fff":C.sub,fontWeight:700,fontSize:12,cursor:"pointer",fontFamily:"'Plus Jakarta Sans',sans-serif"}}>{cat}</button>)}
      </div>


      {/* ── COMPLETED HUSTLES RECORDS ───────────────────── */}
      {completedHustles.length>0&&(
        <div style={{marginBottom:20}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
            <p style={{fontSize:15,fontWeight:800,color:C.text}}>Completed 🏆</p>
            <span style={{fontSize:12,color:C.sub,fontWeight:600}}>{completedHustles.length} hustle{completedHustles.length!==1?"s":""}</span>
          </div>
          <div style={{borderRadius:16,overflow:"hidden",border:`1px solid ${C.border}`}}>
            {completedHustles.map((ch,i)=>{
              const h=ALL_HUSTLES.find(x=>x.id===ch.id);if(!h)return null;
              const upgrades=(HUSTLE_UPGRADES[ch.id]||[]).map(uid=>ALL_HUSTLES.find(x=>x.id===uid)).filter(Boolean);
              const dc=h.diff==="Easy"?"#4CAF50":h.diff==="Medium"?"#FF8C42":"#E74C3C";
              const nextUpgrade=upgrades.find(u=>!completedIds.includes(u.id));
              return (
                <div key={ch.id} style={{padding:"14px 16px",background:C.card,borderBottom:i<completedHustles.length-1?`1px solid ${C.border}`:"none"}}>

/* ─── PAGE TOUR COMPONENT ────────────────────────────────── */
function PageTour({page, C, dark, onDismiss}) {
  var useState=React.useState;
  const steps = PAGE_TOURS[page] || [];
  const [step, setStep] = useState(0);
  if(!steps.length) return null;
  const s = steps[step];
  const isLast = step === steps.length - 1;
  const atBottom = s.target === "bottom";

  const next = () => {
    if(isLast) { onDismiss(); return; }
    setStep(i => i+1);
  };

  return (
    <div style={{position:"fixed",inset:0,zIndex:8000,pointerEvents:"none"}}>
      {/* Dim overlay */}
      <div style={{position:"absolute",inset:0,background:"rgba(0,0,0,0.35)",pointerEvents:"auto"}} onClick={onDismiss}/>
      {/* Tooltip */}
      <div style={{
        position:"absolute",
        [atBottom?"bottom":"top"]:atBottom?90:80,
        left:"50%",transform:"translateX(-50%)",
        width:"calc(100% - 32px)",maxWidth:398,
        pointerEvents:"auto",zIndex:8001,
        animation:"fadeUp 0.3s ease both",
      }}>
        {/* Arrow up */}
        {!atBottom&&<div style={{width:0,height:0,borderLeft:"10px solid transparent",borderRight:"10px solid transparent",borderBottom:`12px solid ${dark?"#1E1E1E":"#fff"}`,marginLeft:32,marginBottom:-1}}/>}
        <div style={{background:dark?"#1E1E1E":"#fff",borderRadius:20,padding:20,boxShadow:"0 12px 48px rgba(0,0,0,0.28)",border:`1px solid ${C.border}`}}>
          {/* Progress dots */}
          <div style={{display:"flex",gap:5,marginBottom:14,alignItems:"center"}}>
            {steps.map((_,i)=>(
              <div key={i} style={{height:4,borderRadius:2,background:i<=step?C.accent:C.border,width:i===step?20:8,transition:"all 0.3s"}}/>
            ))}
            <span style={{fontSize:11,color:C.sub,marginLeft:"auto",fontWeight:600}}>{step+1}/{steps.length}</span>
          </div>
          <p style={{fontSize:16,fontWeight:900,color:C.text,marginBottom:6}}>{s.title}</p>
          <p style={{fontSize:13,color:C.sub,lineHeight:1.65,marginBottom:16}}>{s.body}</p>
          <div style={{display:"flex",gap:10}}>
            <button type="button" onClick={onDismiss} style={{padding:"9px 16px",borderRadius:12,background:"transparent",border:`1px solid ${C.border}`,color:C.sub,fontWeight:600,fontSize:13,cursor:"pointer",fontFamily:"'Plus Jakarta Sans',sans-serif"}}>
              Skip tour
            </button>
            <button type="button" onClick={next} style={{flex:1,padding:"9px 16px",borderRadius:12,background:`linear-gradient(135deg,${C.accent},${C.accentB})`,border:"none",color:"#fff",fontWeight:800,fontSize:13,cursor:"pointer",fontFamily:"'Plus Jakarta Sans',sans-serif"}}>
              {isLast?"Got it! ✓":"Next →"}
            </button>
          </div>
        </div>
        {/* Arrow down */}
        {atBottom&&<div style={{width:0,height:0,borderLeft:"10px solid transparent",borderRight:"10px solid transparent",borderTop:`12px solid ${dark?"#1E1E1E":"#fff"}`,marginLeft:32,marginTop:-1}}/>}
      </div>
    </div>
  );
}

            <button type="button" onClick={()=>startHustle(showHustle)} disabled={!check.can} style={{width:"100%",marginTop:8,padding:15,borderRadius:14,background:check.can?"linear-gradient(135deg,#0FA958,#00C853)":"#ccc",border:"none",color:"#fff",fontWeight:800,fontSize:16,cursor:check.can?"pointer":"not-allowed",minHeight:50,fontFamily:"'Plus Jakarta Sans',sans-serif"}}>{check.can?"Start This Hustle 🚀":"Cannot Start Yet \uD83D\uDD12"}</button>
          </>;

          const today=new Date().toISOString().slice(0,10);

          if(!expenses.find(e=>e.date===today))n.push({em:"📝",t:"Log today's expenses",b:"No expenses logged today. Keep your streak!"});

          const top=Object.entries(catTotals).sort((a,b)=>b[1]-a[1])[0];
          if(top)n.push({em:"📊",t:`Top spend: ${top[0]}`,b:`You've spent ${fmt(top[1])} on ${top[0]} so far.`});
          n.push({em:"🎉",t:"Welcome to NairaCoach!",b:"Your data is saved locally. Start tracking!"});
          return n.slice(0,5).map((x,i)=>(
            <div key={i} style={{marginBottom:10,padding:14,borderRadius:14,background:C.bg,border:`1px solid ${C.border}`,display:"flex",gap:12}}>

              <div><p style={{fontSize:13,fontWeight:800,color:C.text,marginBottom:3}}>{x.t}</p><p style={{fontSize:12,color:C.sub,lineHeight:1.5}}>{x.b}</p></div>
            </div>
          ));
        })()}
      </SheetDark>

      {/* Budget Manager Sheet */}
      <SheetDark show={showBudgets} onClose={()=>setShowBudgets(false)} C={C}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18}}>
          <div>

            <p style={{fontSize:12,color:C.sub,marginTop:2}}>Set a spending limit per category</p>
          </div>
          <div style={{width:40,height:40,borderRadius:12,background:"#0FA95818",display:"flex",alignItems:"center",justifyContent:"center"}}><Icon name="target" size={20} color="#0FA958"/></div>
        </div>
        {EXP_CATS.map(cat=>{
          const status=getBudgetStatus(cat);
          const col=CAT_COLORS[cat]||"#0FA958";
          return (
            <div key={cat} style={{marginBottom:14,padding:14,borderRadius:14,background:C.bg,border:`1px solid ${status&&status.over?"#FF6B6B44":status&&status.warn?"#FFD93D44":C.border}`}}>
              <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:8}}>
                <div style={{width:32,height:32,borderRadius:10,background:col+"22",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                  <Icon name={cat==="Food"?"food":cat==="Transport"?"car":cat==="Bills"?"bolt":cat==="Health"?"heart":cat==="Shopping"?"bag":"bolt"} size={16} color={col}/>

                {status&&status.over&&<span style={{fontSize:11,fontWeight:800,color:"#FF6B6B",background:"#FF6B6B18",borderRadius:6,padding:"2px 8px"}}>Over!</span>}
                {status&&status.warn&&<span style={{fontSize:11,fontWeight:800,color:"#FF8C42",background:"#FF8C4218",borderRadius:6,padding:"2px 8px"}}>{Math.round(status.pct*100)}%</span>}

          <div style={{width:56,height:56,borderRadius:16,background:"#FF6B6B18",display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 14px"}}><Icon name="trash" size={26} color="#FF6B6B"/></div>
          <p style={{fontSize:18,fontWeight:900,color:C.text,textAlign:"center",marginBottom:8}}>Delete Account?</p>
          <p style={{fontSize:13,color:C.sub,textAlign:"center",lineHeight:1.6,marginBottom:22}}>All your data will be permanently deleted.</p>
          <button type="button" onClick={()=>{setDelOpen(false);["phase","user","dark","expenses","incomes","goals","badges","xp","doneTasks","taskDate","streak","activeHustles","savedHustles","completedHustles","privacy","pinSet","bio","budgets","hasSeenTip","seenTours","themeKey","darkPal","lightPal"].forEach(k=>localStorage.removeItem("nc_"+k));setPhase("splash");}} style={{width:"100%",padding:14,borderRadius:14,background:"#FF6B6B",border:"none",color:"#fff",fontWeight:800,fontSize:15,cursor:"pointer",marginBottom:9,minHeight:50,fontFamily:"'Plus Jakarta Sans',sans-serif"}}>Yes, Delete Everything</button>
          <button type="button" onClick={()=>setDelOpen(false)} style={{width:"100%",padding:14,borderRadius:14,background:"transparent",border:`1px solid ${C.border}`,color:C.text,fontWeight:700,fontSize:15,cursor:"pointer",minHeight:50,fontFamily:"'Plus Jakarta Sans',sans-serif"}}>Cancel</button>
        </div>
      </div>}

      {/* Clear history */}
      {clearOpen&&<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.65)",zIndex:500,display:"flex",alignItems:"center",justifyContent:"center",padding:24}} onClick={()=>setClearOpen(false)}>
        <div onClick={e=>e.stopPropagation()} style={{width:"100%",maxWidth:340,background:C.card,borderRadius:24,padding:28,animation:"popIn 0.4s ease"}}>
          <div style={{width:56,height:56,borderRadius:16,background:"#FF8C4218",display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 14px"}}><Icon name="refresh" size={26} color="#FF8C42"/></div>
          <p style={{fontSize:17,fontWeight:900,color:C.text,textAlign:"center",marginBottom:8}}>Clear History?</p>
          <p style={{fontSize:13,color:C.sub,textAlign:"center",lineHeight:1.6,marginBottom:22}}>Clears expenses, income, XP, tasks and badges. Keeps your account and goals.</p>
          <button type="button" onClick={clearHistory} style={{width:"100%",padding:14,borderRadius:14,background:"#FF8C42",border:"none",color:"#fff",fontWeight:800,fontSize:15,cursor:"pointer",marginBottom:9,minHeight:50,fontFamily:"'Plus Jakarta Sans',sans-serif"}}>Yes, Clear</button>
          <button type="button" onClick={()=>setClearOpen(false)} style={{width:"100%",padding:14,borderRadius:14,background:"transparent",border:`1px solid ${C.border}`,color:C.text,fontWeight:700,fontSize:15,cursor:"pointer",minHeight:50,fontFamily:"'Plus Jakarta Sans',sans-serif"}}>Cancel</button>
        </div>
      </div>}

      {/* Goal celebration */}
      {celebGoal&&<div style={{position:"fixed",inset:0,zIndex:9990,display:"flex",alignItems:"center",justifyContent:"center",background:"rgba(0,0,0,0.25)",pointerEvents:"none"}}>
        <div style={{background:C.card,borderRadius:24,padding:36,textAlign:"center",boxShadow:"0 20px 60px rgba(15,169,88,0.5)",maxWidth:290,animation:"popIn 0.4s ease"}}>
          <p style={{fontSize:52,marginBottom:8}}>🎉</p>
          <p style={{fontSize:22,fontWeight:900,color:"#0FA958",marginBottom:4}}>Goal Crushed!</p>
          <p style={{fontSize:14,color:C.sub,marginBottom:4}}>{celebGoal.title}</p>
          <p style={{fontSize:13,fontWeight:700,color:"#FFD93D"}}>+50 XP earned!</p>
        </div>
      </div>}

      {/* Badge unlock */}
      {celebBadge&&<div style={{position:"fixed",inset:0,zIndex:9990,display:"flex",alignItems:"center",justifyContent:"center",background:"rgba(0,0,0,0.25)",pointerEvents:"none"}}>
        <div style={{background:C.card,borderRadius:24,padding:36,textAlign:"center",boxShadow:`0 20px 60px ${celebBadge.color}44`,maxWidth:290,animation:"popIn 0.4s ease"}}>
          <div style={{fontSize:52,marginBottom:8}}>{celebBadge.em}</div>
          <p style={{fontSize:12,fontWeight:700,color:C.sub,letterSpacing:1.5,textTransform:"uppercase",marginBottom:6}}>Badge Unlocked!</p>
          <p style={{fontSize:22,fontWeight:900,color:celebBadge.color,marginBottom:4}}>{celebBadge.title}</p>
          <p style={{fontSize:13,color:C.sub}}>{celebBadge.desc}</p>
        </div>
      </div>}

      {/* Admin password modal */}
      {adminPwdOpen&&<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.7)",zIndex:9000,display:"flex",alignItems:"center",justifyContent:"center",padding:24}} onClick={()=>{setAdminPwdOpen(false);setAdminPwdErr("");}}>
        <div onClick={e=>e.stopPropagation()} style={{width:"100%",maxWidth:340,background:C.card,borderRadius:24,padding:28,animation:"popIn 0.35s ease",fontFamily:"'Plus Jakarta Sans',sans-serif"}}>
          <div style={{width:56,height:56,borderRadius:18,background:"linear-gradient(135deg,#7B2FBE,#4A0080)",display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 16px"}}><Icon name="key" size={26} color="#fff" sw={2}/></div>
          <p style={{fontSize:20,fontWeight:900,color:C.text,textAlign:"center",marginBottom:6}}>Admin Access</p>
          <p style={{fontSize:13,color:C.sub,textAlign:"center",marginBottom:20}}>Enter the admin password</p>
          <input value={adminPwdInput} onChange={e=>{setAdminPwdInput(e.target.value);setAdminPwdErr("");}} onKeyDown={e=>e.key==="Enter"&&doAdminLogin()} type="password" placeholder="Password..." autoFocus style={{width:"100%",padding:"14px 16px",borderRadius:14,border:`1.5px solid ${adminPwdErr?"#FF6B6B":C.border}`,fontSize:15,outline:"none",fontFamily:"'Plus Jakarta Sans',sans-serif",background:C.card,color:C.text,marginBottom:8,textAlign:"center",letterSpacing:2}}/>
          {adminPwdErr&&<p style={{fontSize:12,color:"#FF6B6B",textAlign:"center",marginBottom:10,fontWeight:600}}>{adminPwdErr}</p>}
          <button type="button" onClick={doAdminLogin} style={{width:"100%",padding:15,borderRadius:14,background:"linear-gradient(135deg,#7B2FBE,#4A0080)",border:"none",color:"#fff",fontWeight:800,fontSize:15,cursor:"pointer",marginBottom:10,minHeight:50,fontFamily:"'Plus Jakarta Sans',sans-serif"}}>🔑 Enter</button>
          <button type="button" onClick={()=>{setAdminPwdOpen(false);setAdminPwdErr("");setAdminPwdInput("");}} style={{width:"100%",padding:13,borderRadius:14,background:"transparent",border:`1px solid ${C.border}`,color:C.sub,fontWeight:600,fontSize:14,cursor:"pointer",fontFamily:"'Plus Jakarta Sans',sans-serif"}}>Cancel</button>
        </div>
      </div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<NairaCoach/>);

</script>
<!-- PWA Install Banner -->
<div id="install-banner" class="hidden">
  <div style="width:42px;height:42px;border-radius:12px;background:linear-gradient(135deg,#0FA958,#00C853);display:flex;align-items:center;justify-content:center;flex-shrink:0;">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/>
      <line x1="4" y1="9" x2="20" y2="9"/><line x1="4" y1="15" x2="20" y2="15"/>
    </svg>
  </div>
  <div style="flex:1;min-width:0;">
    <p style="font-size:14px;font-weight:800;color:#121212;margin:0 0 2px;">Install NairaCoach</p>
    <p style="font-size:12px;color:#6B7280;margin:0;">Add to your home screen for the best experience</p>
  </div>
  <button id="install-btn" style="padding:8px 16px;border-radius:10px;background:linear-gradient(135deg,#0FA958,#00C853);border:none;color:#fff;font-weight:700;font-size:13px;cursor:pointer;flex-shrink:0;font-family:'Plus Jakarta Sans',sans-serif;">Install</button>
  <button id="install-dismiss" style="background:none;border:none;cursor:pointer;padding:4px;flex-shrink:0;color:#aaa;font-size:18px;line-height:1;">&times;</button>
</div>

<script>
// ═══════════════════════════════════════════════════════════════
// NAIRACOACH OFFLINE-FIRST ENGINE
// Works like the thread describes:
// 1. Detects network status in real time
// 2. Queues actions taken offline
// 3. Syncs automatically when connection returns
// 4. Shows clear feedback so users always know what's happening
// ═══════════════════════════════════════════════════════════════

// ── NETWORK STATUS MONITOR ────────────────────────────────────
window._nc_online = navigator.onLine;
window._nc_networkListeners = [];

function nc_notifyNetwork(online) {
  window._nc_online = online;
  window._nc_networkListeners.forEach(fn => fn(online));
  // Show/hide the offline banner
  const banner = document.getElementById('nc-offline-banner');
  const onlineBanner = document.getElementById('nc-online-banner');
  if (banner) banner.style.display = online ? 'none' : 'flex';
  if (onlineBanner) {
    if (online) {
      onlineBanner.style.display = 'flex';
      setTimeout(() => { onlineBanner.style.display = 'none'; }, 3000);
      nc_flushQueue(); // Attempt to sync when back online
    } else {
      onlineBanner.style.display = 'none';
    }
  }
}

window.addEventListener('online',  () => nc_notifyNetwork(true));
window.addEventListener('offline', () => nc_notifyNetwork(false));

// Expose so React components can subscribe
window.nc_onNetworkChange = fn => {
  window._nc_networkListeners.push(fn);
  return () => { window._nc_networkListeners = window._nc_networkListeners.filter(f => f !== fn); };
};

// ── OFFLINE SYNC QUEUE ────────────────────────────────────────
// When user is offline, actions that would normally hit the server
// (AI insights, future backend calls) get queued here.
// When connection returns, nc_flushQueue() replays them.
const NC_QUEUE_KEY = 'nc_sync_queue';

function nc_getQueue() {
  try { return JSON.parse(localStorage.getItem(NC_QUEUE_KEY) || '[]'); } catch { return []; }
}
function nc_saveQueue(q) {
  try { localStorage.setItem(NC_QUEUE_KEY, JSON.stringify(q)); } catch {}
}
function nc_enqueue(action) {
  const q = nc_getQueue();
  q.push({ ...action, timestamp: Date.now(), id: Math.random().toString(36).slice(2) });
  nc_saveQueue(q);
  console.log('[NairaCoach] Queued offline action:', action.type);
}
function nc_flushQueue() {
  const q = nc_getQueue();
  if (!q.length) return;
  console.log(`[NairaCoach] Back online — flushing ${q.length} queued action(s)`);
  // For now NairaCoach is fully localStorage-based so all data is already saved.
  // This queue handles future backend sync (Supabase etc).
  // Clear the queue since localStorage IS the source of truth.
  nc_saveQueue([]);
  // Notify React to refresh AI insights now that we're online
  if (window._nc_onFlush) window._nc_onFlush();
}

// Expose globally so React can use
window.nc_enqueue = nc_enqueue;
window.nc_flushQueue = nc_flushQueue;
window.nc_getQueueLength = () => nc_getQueue().length;

// ── NETWORK QUALITY ESTIMATOR ────────────────────────────────
// Helps the app adapt to slow connections (3G in Kano vs fiber in VI)
window._nc_connection = 'unknown';
(function detectConnection() {
  const conn = navigator.connection || navigator.mozConnection || navigator.webkitConnection;
  if (conn) {
    const update = () => {
      const type = conn.effectiveType || conn.type || 'unknown';
      window._nc_connection = type;
      // Tag the body so CSS can respond
      document.body.setAttribute('data-conn', type);
    };
    update();
    conn.addEventListener('change', update);
  }
})();

// ── PWA INSTALL PROMPT ────────────────────────────────────────
let deferredPrompt = null;
const banner = document.getElementById('install-banner');
const installBtn = document.getElementById('install-btn');
const dismissBtn = document.getElementById('install-dismiss');

const isInstalled = window.matchMedia('(display-mode: standalone)').matches ||
                    window.navigator.standalone === true;

window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  if(!isInstalled && !localStorage.getItem('nc_install_dismissed')) {
    setTimeout(() => { banner && banner.classList.remove('hidden'); }, 3000);
  }
});

installBtn && installBtn.addEventListener('click', async () => {
  if(!deferredPrompt) return;
  banner.classList.add('hidden');
  deferredPrompt.prompt();
  const { outcome } = await deferredPrompt.userChoice;
  deferredPrompt = null;
});

dismissBtn && dismissBtn.addEventListener('click', () => {
  banner && banner.classList.add('hidden');
  localStorage.setItem('nc_install_dismissed', '1');
});

// iOS Safari — show manual instructions
const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
if(isIOS && !window.navigator.standalone && !localStorage.getItem('nc_install_dismissed')) {
  setTimeout(() => {
    const b = document.getElementById('install-banner');
    if(!b) return;
    const p = b.querySelector('p:last-child');
    if(p) p.textContent = 'Tap \uD83D\uDCE4 Share \u2192 "Add to Home Screen" to install';
    b.classList.remove('hidden');
  }, 3000);
}
</script>
</body>
</html>
